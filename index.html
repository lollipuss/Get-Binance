<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>币安注册 - 专属邀请链接</title>
  <style>
    /* 原有样式保持不变，这里省略以节省空间，可直接复制之前版本的 style */
    .btn-jump {
      background: #00c853;  /* 绿色，更醒目表示“直接跳” */
      color: white;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>币安专属注册通道</h1>
  <div class="subtitle">使用此链接注册可获得最高返佣 + 福利</div>

  <div class="card">
    <div style="text-align:center; margin-bottom:16px; font-size:1.1rem;">
      我的币安邀请链接：
    </div>
    
    <div class="link-box" id="inviteLink">
      https://www.bsmkweb.cc/register?ref=YUY8888
    </div>

    <button class="btn btn-jump" onclick="tryJumpToBrowser()">
      → 立即跳转到系统浏览器打开（推荐）
    </button>

    <button class="btn btn-copy" onclick="copyLink()">
      📋 一键复制链接（备用）
    </button>

    <div class="steps">
      <strong>操作建议：</strong><br><br>
      1. 优先点击上方「立即跳转到系统浏览器打开」<br>
      2. 如果仍停留在当前页面或加载异常 → 用「一键复制链接」<br>
      3. 打开手机自带浏览器（Safari / Chrome）<br>
      4. 长按地址栏 → 粘贴 → 前往<br>
      5. 完成注册享受返佣
    </div>

    <div class="tip">
      <strong>重要：</strong><br>
      微信/QQ/Telegram 内置浏览器常导致注册失败或不显示福利，<br>
      务必用系统浏览器打开！
    </div>
  </div>
</div>

<script>
const inviteUrl = "https://www.bsmkweb.cc/register?ref=YUY8888";

function isInAppBrowser() {
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  return /MicroMessenger/i.test(ua) ||   // 微信
         /QQ/i.test(ua) ||                // QQ
         /weibo/i.test(ua) ||             // 微博
         /TikTok/i.test(ua);              // 等常见内置浏览器
}

function tryJumpToBrowser() {
  if (!isInAppBrowser()) {
    // 不在内置浏览器，直接正常打开
    window.open(inviteUrl, '_blank');
    return;
  }

  // 尝试几种跳出方式
  let opened = false;

  // 方法1: _system (常用于 hybrid app，但纯 web 有时也触发系统选择)
  try {
    window.open(inviteUrl, '_system');
    opened = true;
  } catch(e) {}

  // 方法2: _blank + focus
  if (!opened) {
    const win = window.open(inviteUrl, '_blank');
    if (win) {
      win.focus();
      opened = true;
    }
  }

  // 方法3: location.href 重定向（部分场景能跳出）
  if (!opened) {
    window.location.href = inviteUrl;
    opened = true;  // 假设成功
  }

  // 如果以上都没跳出（还在当前页），fallback 到复制 + 提示
  setTimeout(() => {
    if (document.hasFocus() && isInAppBrowser()) {  // 还在当前页
      copyLink(true);  // true 表示来自跳转失败
    }
  }, 1500);  // 给 1.5 秒让跳转生效
}

function copyLink(fromJumpFail = false) {
  navigator.clipboard.writeText(inviteUrl).then(() => {
    let msg = "邀请链接已复制！请立即打开系统自带浏览器（Safari/Chrome），粘贴到地址栏访问～";
    if (fromJumpFail) {
      msg = "自动跳转失败（常见于微信/QQ内置浏览器）。\n链接已复制，请手动打开系统浏览器粘贴访问！";
    }
    alert(msg);
  }).catch(() => {
    alert("复制失败，请长按链接文字手动复制：" + inviteUrl);
  });
}
</script>

</body>
</html>
