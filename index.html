<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>币安注册 - 专属邀请链接</title>
  <style>
    /* 保留你原来的全部 style，这里只展示新增/修改部分 */
    .btn-jump {
      background: #4caf50;  /* 绿色，更吸引点击 */
      color: white;
    }
    .btn-jump:hover {
      background: #43a047;
    }
  </style>
</head>
<body>

<!-- HTML 结构保持不变，只改按钮类名和 onclick -->

<button class="btn btn-jump" onclick="attemptJump()">
  → 立即跳转到系统浏览器（推荐）
</button>

<button class="btn btn-copy" onclick="copyLink()">
  📋 一键复制链接（备用方式）
</button>

<!-- steps 和 tip 稍作调整 -->
<div class="steps">
  <strong>推荐操作流程：</strong><br><br>
  1. 点击「立即跳转到系统浏览器」 — 大部分手机可自动成功<br>
  2. 如果页面没变化或仍卡在微信 → 点击「一键复制链接」<br>
  3. 回到手机桌面，打开 Safari / Chrome 等自带浏览器<br>
  4. 长按地址栏粘贴链接 → 前往注册<br>
  5. 注册成功后可享受返佣权益
</div>

<script>
const INVITE_URL = "https://www.bsmkweb.cc/register?ref=YUY8888";

function isLikelyWeChat() {
  const ua = navigator.userAgent.toLowerCase();
  return ua.includes('micromessenger') || ua.includes('wechat');
}

function attemptJump() {
  if (!isLikelyWeChat()) {
    // 不在微信，直接正常打开
    window.open(INVITE_URL, '_blank');
    return;
  }

  // 微信内尝试跳出（顺序从最可能到次之）
  const attempts = [
    () => window.open(INVITE_URL, '_system'),
    () => window.open(INVITE_URL, '_blank'),
    () => { window.location.href = INVITE_URL; }
  ];

  attempts.forEach(fn => {
    try { fn(); } catch(e) {}
  });

  // 1.5 秒后检查是否还在当前页（微信内通常不会马上离开）
  setTimeout(() => {
    if (document.hasFocus() && isLikelyWeChat()) {
      // 还在微信 → 自动复制 + 友好提示
      navigator.clipboard.writeText(INVITE_URL).then(() => {
        alert(
          "自动跳转失败（微信内置浏览器限制）\n\n" +
          "链接已自动复制到剪贴板！\n\n" +
          "请现在：\n" +
          "1. 返回手机桌面\n" +
          "2. 打开 Safari / Chrome / 系统浏览器\n" +
          "3. 长按地址栏 → 粘贴 → 前往\n\n" +
          "这样就能正常注册并获得返佣啦～"
        );
      }).catch(() => {
        alert(
          "自动跳转失败，且复制也失败。\n\n" +
          "请长按下方链接手动复制：\n" + INVITE_URL
        );
      });
    }
  }, 1500);
}

function copyLink() {
  navigator.clipboard.writeText(INVITE_URL).then(() => {
    alert(
      "链接已复制！\n\n" +
      "请打开系统浏览器（Safari/Chrome），粘贴到地址栏访问。\n" +
      "避免在微信内打开，以确保注册顺利。"
    );
  }).catch(() => {
    alert("复制失败，请长按链接手动复制：" + INVITE_URL);
  });
}
</script>

</body>
</html>
